<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        /* Page Layout Fix */
        .content-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding-top: 40px;
            background-color: #f4f4f4;
        }

        .register-container {
            max-width: 350px;
            width: 100%;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .register-container h2 {
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        /* Input field styling */
        .input-group {
            width: 100%;
            margin-bottom: 12px;
        }

        /* Regular input fields */
        .input-box {
            width: 95%;
            height: 30px;
            padding: 5px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: border-color 0.3s ease-in-out;
            background-color: white;
        }

        .input-box:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        /* Select fields (Dropdowns) */
        .select-box {
            color: rgb(94, 94, 94);
            width: 100%;
            height: 40px; /* Set height */
            padding: 5px;
            font-size: 14px; /* Text size */
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: border-color 0.3s ease-in-out;
            background-color: white;
            appearance: none; /* Remove default styles */
            cursor: pointer;
            font-size: 17px;
        }
        
        /* Style the dropdown options */
        .select-box option {
            font-size: 14px;
            color: #111111be;
            background-color: white;
            padding: 5px;
        }
        
        /* Highlight option when hovered (only works in Firefox) */
        .select-box option:hover {
            background-color: #007bff;
            color: white;
        }

        /* Submit button */
        .register-btn {
            width: 100%;
            height: 40px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="content-wrapper">
    <div class="register-container">
        <h2>Register</h2>
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="input-group">
                    {{ field }}
                </div>
            {% endfor %}

            <button type="submit" class="register-btn">Register</button>
            <a class="login-btn" href="{% url 'student_login' %}">Login</a>

        </form>
    </div>
</div>

</body>
</html>
