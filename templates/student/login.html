<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
</head>
<body>
    <div class="login-container">
        <h2 class="login-title">Student Login</h2>
        
        <form method="post" class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                {% for field in form %}
                    {{ field }}
                {% endfor %}
            </div>
            
            <button type="submit" class="login-btn">Login</button>
            
            <a href="{% url 'register_student' %}" class="register-link">Register</a>
        </form>
    
        {% for message in messages %}
            <p class="error-message">{{ message }}</p>
        {% endfor %}
    </div>
    
    <style>
        /* Full-Page Centering */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;  /* FIX: Allows better mobile responsiveness */
            background: #f8f9fa;
            padding: 20px;
        }
    
        /* Title Styling */
        .login-title {
            font-size: 28px;
            font-weight: bold;
            color: #183661;
            margin-bottom: 20px;
        }
    
        /* Login Form */
        .login-form {
            width: 100%;
            max-width: 350px;
            padding: 50px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
    
        /* Form Fields */
        .login-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }
    
        /* Remove Default Margins from Django's form.as_p */
        .login-form p {
            margin: 0;
        }
    
        /* Input Focus Effect */
        .login-form input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }
    
        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background-color: #183661;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
        }
    
        .login-btn:hover {
            background-color: #1f8cea;
        }
    
        /* Register Link */
        .register-link {
            display: block;
            margin-top: 15px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
    
        .register-link:hover {
            text-decoration: underline;
        }
    
        /* Error Messages */
        .error-message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    
    </style>
    
</body>
</html>
