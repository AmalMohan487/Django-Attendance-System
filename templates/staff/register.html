<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        /* Page Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container {
            width: 100%;
            max-width: 380px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .register-container h2 {
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        /* Form Input Styling */
        .input-group {
            width: 100%;
            margin-bottom: 12px;
            text-align: left;
        }

        .input-box {
            width: 100%;
            height: 35px;
            padding: 8px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: 0.3s ease-in-out;
            background-color: white;
        }

        .input-box:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        /* Dropdown (Department Select) */
        .select-box {
            width: 100%;
            height: 35px;
            padding: 8px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
            appearance: none; /* Remove default dropdown styling */
        }

        .select-box:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }
        .register-link{
            text-decoration: none;
            padding: 10px;
            font-size: 15px;
        }

        /* Submit Button */
        .register-btn {
            width: 100%;
            height: 40px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .register-btn:hover {
            background-color: #0056b3;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .register-container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <div class="input-group">
                {% if field.name == "department" %}
                    <select name="{{ field.name }}" class="select-box"  required>
                        <option value="" disabled selected style="color: #141313d2;">Department</option>
                        {% for choice in field.field.choices %}
                            <option value="{{ choice.0 }}">{{ choice.1 }}</option>
                        {% endfor %}
                    </select>
                {% else %}
                    {{ field }}
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="register-btn">Register</button>
        <a href="{% url 'teacher_login' %}" class="register-link">Login</a>
    </form>
</div>

</body>
</html>
