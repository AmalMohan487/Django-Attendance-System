{% extends 'admin/adminindex.html' %}
{% block content %}
<style>
    /* Center the form */
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f7fc;
    }

    /* Card-style form */
    .form-container {
        width: 100%;
        max-width: 450px;
        padding: 25px;
        background: white;
        border-radius: 12px;
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: 0.3s ease;
    }

    .form-container:hover {
        box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.15);
    }

    h2 {
        color: #333;
        margin-bottom: 20px;
        font-weight: bold;
    }

    /* Form Styling */
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .input-group {
        position: relative;
        width: 100%;
    }

    /* Floating Labels */
    .input-group label {
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        color: #777;
        font-size: 14px;
        transition: 0.3s ease;
        pointer-events: none;
        background: white;
        padding: 0 5px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
        background: none;
    }

    /* Label moves up when typing */
    input:focus + label, 
    input:not(:placeholder-shown) + label {
        top: -10px;
        left: 10px;
        font-size: 12px;
        color: #007bff;
    }

    /* Improved Dropdown Styling */
    select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
        background: white;
        appearance: none;
        cursor: pointer;
    }

    /* Submit Button */
    .submit-btn {
        background-color: #007bff;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .submit-btn:hover {
        background-color: #0056b3;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .form-container {
            width: 90%;
            padding: 20px;
        }
    }
</style>

<div class="form-wrapper">
    <div class="form-container">
        <h2>Add New Subject</h2>
        
        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="input-group">
                    {% if field.name == "department" or field.name == "semester" %}
                        <!-- Dropdown WITHOUT label -->
                        <select name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-control">
                            <option value="" selected disabled>{{ field.label }}</option>
                            {% for choice in field.field.choices %}
                                <option value="{{ choice.0 }}">{{ choice.1 }}</option>
                            {% endfor %}
                        </select>
                    {% else %}
                        <input type="{{ field.field.widget.input_type }}" 
                               name="{{ field.html_name }}" 
                               id="{{ field.id_for_label }}" 
                               class="form-control" 
                               placeholder=" ">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="submit-btn w-100">Add Subject</button>
        </form>
    </div>
</div>

{% endblock %}
