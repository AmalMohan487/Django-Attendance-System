{% extends 'admin/adminindex.html' %}

{% block content %}
<style>
    /* Centering the delete card */
    .delete-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f8f9fa; /* Light gray background */
    }

    /* Delete Card Styling */
    .delete-card {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 400px;
    }

    .delete-card h2 {
        color: #dc3545; /* Bootstrap Red */
        font-weight: bold;
    }

    .delete-card hr {
        border: 1px solid #dee2e6;
        margin: 10px 0;
    }

    .delete-card p {
        font-size: 16px;
        color: #555;
    }

    .subject-name {
        font-weight: bold;
        color: #007bff;
        font-size: 18px;
    }

    /* Buttons */
    .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    .btn-delete {
        background: #dc3545;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-delete:hover {
        background: #c82333;
    }

    .btn-cancel {
        background: #6c757d;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-cancel:hover {
        background: #5a6268;
    }
</style>

<div class="delete-container">
    <div class="delete-card">
        <h2>Confirm Deletion</h2>
        <hr>
        <p>Are you sure you want to delete this assigned subject?</p>
        <p class="subject-name">{{ assign_subject }}</p>

        <div class="button-group">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-delete">Yes, Delete</button>
            </form>
            <a href="{% url 'Asub' %}" class="btn-cancel">Cancel</a>
        </div>
    </div>
</div>

{% endblock %}
