{% extends 'admin/adminindex.html' %}
{% block content %}
<style>
    /* Center the form vertically and horizontally */
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* Full screen height */
    }

    .form-container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    h2 {
        color: #333;
        margin-bottom: 15px;
    }

    /* Form Styling */
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .input-group {
        position: relative;
        width: 100%;
    }

    /* Labels as Placeholders */
    .input-group label {
        position: absolute;
        top: 50%;
        left: 10px;
        transform: translateY(-50%);
        color: #999;
        font-size: 16px;
        transition: 0.3s;
        pointer-events: none; /* Prevent clicking on label */
    }

    /* Styled input fields */
    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
    }

    /* When input is focused or has content, move label */
    input:focus + label, 
    input:not(:placeholder-shown) + label,
    select:focus + label, 
    select:not([value=""]) + label,
    textarea:focus + label, 
    textarea:not(:placeholder-shown) + label {
        top: 5px;
        font-size: 12px;
        color: #007bff;
    }

    /* Submit Button Styling */
    button {
        background-color: #007bff;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #0056b3;
    }

    /* Responsive Design */
    @media (max-width: 600px) {
        .form-container {
            width: 90%;
            padding: 15px;
        }
    }
</style>

<div class="form-wrapper">
    <div class="form-container">
        <h2>Add Department</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="input-group">
                {{ field }}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            </div>
            {% endfor %}
            <button type="submit">Save</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Add placeholder attribute dynamically
        document.querySelectorAll(".input-group input, .input-group textarea, .input-group select").forEach(field => {
            field.setAttribute("placeholder", " "); // Empty space to trigger CSS
        });
    });
</script>
{% endblock %}
