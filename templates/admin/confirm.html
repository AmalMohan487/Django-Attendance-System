{% extends 'admin/adminindex.html' %}
{% load static %}

{% block content %}
<style>
/* Center the form vertically and horizontally */
.center-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh; /* Adjust based on your layout */
}

/* Button Styling */
.increase-semester-btn {
    background-color: #dc3545; /* Bootstrap danger color */
    color: white;
    font-weight: bold;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    transition: 0.3s;
    cursor: pointer;
}

.increase-semester-btn:hover {
    background-color: #c82333; /* Darker red for hover effect */
    transform: scale(1.05); /* Slight zoom effect */
}
</style>

<div class="center-container">
    <form action="{% url 'increment_semester' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="increase-semester-btn"
            onclick="return confirm('Are you sure you want to proceed? This will delete all attendance records and graduate final-year students.')">
            Increase Semester & Clear Attendance
        </button>
    </form>
</div>

{% endblock %}
